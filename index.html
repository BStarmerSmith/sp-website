<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suzy Parker Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="home-layout">

  <div class="glow glow-1" aria-hidden="true"></div>
  <div class="glow glow-2" aria-hidden="true"></div>
  <div class="glow glow-3" aria-hidden="true"></div>

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="header-brand">
        <img src="/assets/sp-logo-header.png" alt="Suzy Parker Games logo">
        <span>Suzy Parker Games</span>
      </a>
      <nav class="nav-desktop">
        <a href="/coming-soon.html" class="nav-link">Games</a>
        <a href="/about-us.html" class="nav-link">About Us</a>
        <a href="/contact-us.html" class="nav-link">Contact Us</a>
      </nav>
      <button class="mobile-menu-btn" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    <nav class="mobile-nav">
      <a href="/coming-soon.html" class="nav-link">Games</a>
      <a href="/about-us.html" class="nav-link">About Us</a>
      <a href="/contact-us.html" class="nav-link">Contact Us</a>
    </nav>
  </header>

  <div class="card-stage">
    <div class="card-wrapper" id="cardWrapper">
      <div class="playing-card card-front">
        <img class="card-image" id="cardFrontImage" src="/assets/cards/1.png" alt="Card front" />
      </div>
      <div class="playing-card card-back">
        <img class="card-image" id="cardBackImage" src="/assets/cards/back_1.png" alt="Card back" />
      </div>
    </div>
  </div>

  <div class="scroll-indicator" id="scrollIndicator">
    <span>Scroll to explore</span>
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
    </svg>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
