<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suzy Parker Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="home-layout">

  <div class="glow glow-1" aria-hidden="true"></div>
  <div class="glow glow-2" aria-hidden="true"></div>
  <div class="glow glow-3" aria-hidden="true"></div>

  <a href="/" class="home-logo" aria-label="Suzy Parker Games home">
    <img src="/assets/sp-logo-header.png" alt="Suzy Parker Games" />
  </a>

  <div class="card-stage" id="cardStage">
    <div class="card-wrapper" id="cardWrapper">
      <div class="playing-card card-front">
        <img class="card-image" id="cardFrontImage" src="/assets/cards/1.png" alt="Card front" />
      </div>
      <div class="playing-card card-back">
        <img class="card-image" id="cardBackImage" src="/assets/cards/back_1.png" alt="Card back" />
      </div>
    </div>
  </div>

  <div class="flip-indicator" id="flipIndicator" aria-hidden="true">
    <div class="flip-arrow" id="flipUp">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
      </svg>
    </div>
    <div class="flip-arrow" id="flipDown">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
